<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Footer Component</title>

    <style>
        :root {
            /* Dark Mode */
            --hell-red: #FF0022;
            --primary-green: #2a5f2a;
            --bg-dark: #0f0f0f;
            --void: #0A0A0A;
            --white: #F0EDE8;
            --text-muted: #888;
            --text-main: #e5e5e5;
            --glass-border: rgba(42, 95, 42, 0.3);
            --glow: rgba(255,0,34,0.6);
            --dim: #888888;
        }

        body.light-mode {
            /* Light Mode */
            --hell-red: #d40029;
            --primary-green: #1a4a1a;
            --bg-dark: #f5f5f5;
            --void: #ffffff;
            --white: #1a1a1a;
            --text-muted: #666;
            --text-main: #333;
            --glass-border: rgba(42, 95, 42, 0.15);
            --glow: rgba(212,0,41,0.3);
            --dim: #777;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-main);
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* FOOTER */
        footer {
            background: var(--void);
            border-top: 1px solid var(--glass-border);
            padding: 4rem 1rem 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            transition: all 0.3s ease;
        }

        body.light-mode footer {
            background: #f5f5f5;
        }

        .footer-inner {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--dim);
            font-size: 0.82rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        .footer-inner a {
            color: var(--dim);
            text-decoration: none;
            transition: all 0.3s;
            font-family: 'Share Tech Mono', monospace;
        }

        .footer-inner a:hover {
            color: var(--hell-red);
            text-shadow: 0 0 10px var(--glow);
        }

        .footer-separator {
            color: var(--dim);
            opacity: 0.5;
        }

        .footer-socials {
            display: flex;
            gap: 15px;
            align-items: center;
            padding-left: 15px;
            border-left: 1px solid var(--glass-border);
            margin-left: 10px;
        }

        .footer-socials a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 0, 34, 0.1);
            transition: all 0.3s;
        }

        .footer-socials a:hover {
            background: var(--hell-red);
            transform: translateY(-2px) scale(1.1);
        }

        .footer-socials svg {
            width: 16px;
            height: 16px;
            fill: var(--dim);
            transition: fill 0.3s;
        }

        .footer-socials a:hover svg {
            fill: var(--void);
        }

        .footer-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: var(--hell-red);
            text-shadow: 0 0 20px var(--glow);
            font-weight: 700;
        }

        .footer-copy {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: var(--dim);
            text-transform: uppercase;
        }

        /* FOOTER LINKS SECTION */
        .footer-links {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .footer-links-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footer-links-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            color: var(--hell-red);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .footer-links-group a {
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .footer-inner {
                flex-direction: column;
                gap: 20px;
            }

            .footer-socials {
                border-left: none;
                padding-left: 0;
                margin-left: 0;
                border-top: 1px solid var(--glass-border);
                padding-top: 15px;
            }

            .footer-links {
                flex-direction: column;
                gap: 20px;
            }

            footer {
                padding: 3rem 1rem 2rem;
            }
        }

        /* ANIMATIONS */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            animation: slideUp 0.6s ease;
        }
    </style>
</head>

    <script>
        // Auto-apply saved theme from header
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
        }

        // Listen for theme changes from other components
        window.addEventListener('storage', (e) => {
            if (e.key === 'theme') {
                document.body.classList.toggle('light-mode', e.newValue === 'light');
            }
        });

        // Also check for theme changes on the same tab
        const observer = new MutationObserver(() => {
            const isDark = !document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
    </script>
