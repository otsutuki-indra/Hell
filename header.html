<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Component</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Mode */
            --hell-red: #FF0022;
            --hell-orange: #FF4500;
            --primary-green: #2a5f2a;
            --hover-green: #3d7f3d;
            --bg-dark: #0f0f0f;
            --bg-accent: #1a1a1a;
            --void: #0A0A0A;
            --white: #F0EDE8;
            --text-muted: #888;
            --text-main: #e5e5e5;
            --glass-border: rgba(42, 95, 42, 0.3);
            --glass-bg: rgba(20, 20, 20, 0.95);
            --glow: rgba(255,0,34,0.6);
            --dim: #888888;
        }

        body.light-mode {
            /* Light Mode */
            --hell-red: #d40029;
            --primary-green: #1a4a1a;
            --hover-green: #2d6b2d;
            --bg-dark: #f5f5f5;
            --bg-accent: #ffffff;
            --void: #ffffff;
            --white: #1a1a1a;
            --text-muted: #666;
            --text-main: #333;
            --glass-border: rgba(42, 95, 42, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glow: rgba(212,0,41,0.3);
            --dim: #777;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--void);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(var(--bg-dark-rgb, 10), var(--bg-dark-rgb, 10), var(--bg-dark-rgb, 10), 0.85);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        body.light-mode header {
            background: rgba(245, 245, 245, 0.95);
            border-bottom: 1px solid var(--glass-border);
        }

        .header-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.15em;
            color: var(--hell-red);
            text-shadow: 0 0 30px var(--glow);
            animation: flicker 4s infinite;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .header-logo span {
            color: var(--white);
        }

        @keyframes flicker {
            0%,95%,100% { opacity: 1; }
            96% { opacity: 0.8; }
            97% { opacity: 1; }
            98% { opacity: 0.6; }
            99% { opacity: 1; }
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: var(--dim);
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.3s, text-shadow 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--hell-red);
            transition: width 0.3s;
        }

        .nav-links a:hover {
            color: var(--hell-red);
            text-shadow: 0 0 15px var(--glow);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* THEME TOGGLE */
        .theme-toggle {
            position: relative;
            width: 60px;
            height: 30px;
            background: var(--glass-border);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            padding: 3px;
        }

        .theme-toggle:hover {
            border-color: var(--hell-red);
            background: rgba(255, 0, 34, 0.1);
        }

        .toggle-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--hell-red);
            position: absolute;
            left: 3px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        body.light-mode .toggle-circle {
            left: 33px;
        }

        .toggle-icon {
            font-size: 14px;
        }

        /* NAV BUTTON */
        .nav-btn {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border: 1px solid var(--hell-red);
            color: var(--hell-red);
            background: transparent;
            padding: 10px 24px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--hell-red);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s;
            z-index: -1;
        }

        .nav-btn:hover {
            color: var(--void);
        }

        .nav-btn:hover::before {
            transform: scaleX(1);
        }

        /* MOBILE MENU */
        .mobile-menu-btn {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .mobile-menu-btn span {
            width: 25px;
            height: 2px;
            background: var(--hell-red);
            transition: all 0.3s;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .mobile-menu-btn {
                display: flex;
            }

            header {
                padding: 15px 20px;
            }

            .header-logo {
                font-size: 1.4rem;
            }

            .header-controls {
                gap: 10px;
            }
        }

        /* CUSTOM CURSOR */
        .cursor {
            position: fixed;
            width: 12px;
            height: 12px;
            background: var(--hell-red);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s;
            box-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow);
        }

        .cursor-ring {
            position: fixed;
            width: 36px;
            height: 36px;
            border: 1px solid rgba(255, 0, 34, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease;
        }
    </style>
</head>
<body>

    <!-- CUSTOM CURSOR -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <!-- HEADER -->
    <header>
        <a href="index.html" class="header-logo">HELL<span>CORP</span></a>

        <nav class="nav-links">
            <li><a href="index.html#services">Services</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#work">Work</a></li>
            <li><a href="index.html#process">Process</a></li>
            <li><a href="terms.html">Terms</a></li>
            <li><a href="policy.html">Policy</a></li>
        </nav>

        <div class="header-controls">
            <div class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
                <div class="toggle-circle">
                    <span class="toggle-icon" id="themeIcon">🌙</span>
                </div>
            </div>
            <button class="nav-btn" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">IGNITE</button>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- SPACER FOR FIXED HEADER -->
    <div style="height: 80px;"></div>

    <script>
        // CURSOR
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursorRing');
        let mx = 0, my = 0, rx = 0, ry = 0;

        document.addEventListener('mousemove', e => {
            mx = e.clientX;
            my = e.clientY;
            cursor.style.left = mx + 'px';
            cursor.style.top = my + 'px';
        });

        function animateRing() {
            rx += (mx - rx) * 0.15;
            ry += (my - ry) * 0.15;
            ring.style.left = rx + 'px';
            ring.style.top = ry + 'px';
            requestAnimationFrame(animateRing);
        }
        animateRing();

        // CURSOR SCALE ON HOVER
        document.querySelectorAll('a, button, .nav-btn, .theme-toggle').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'translate(-50%,-50%) scale(2)';
                ring.style.transform = 'translate(-50%,-50%) scale(1.5)';
                ring.style.borderColor = 'rgba(255,0,34,0.8)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'translate(-50%,-50%) scale(1)';
                ring.style.transform = 'translate(-50%,-50%) scale(1)';
                ring.style.borderColor = 'rgba(255,0,34,0.5)';
            });
        });

        // THEME TOGGLE
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            themeIcon.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            themeIcon.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });

        // MOBILE MENU TOGGLE
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.querySelector('.nav-links');
        
        mobileMenuBtn.addEventListener('click', () => {
            navLinks.style.display = navLinks.style.display === 'flex' ? 'none' : 'flex';
            navLinks.style.position = 'absolute';
            navLinks.style.top = '80px';
            navLinks.style.left = '0';
            navLinks.style.right = '0';
            navLinks.style.flexDirection = 'column';
            navLinks.style.background = 'var(--glass-bg)';
            navLinks.style.borderBottom = '1px solid var(--glass-border)';
            navLinks.style.padding = '20px';
            navLinks.style.gap = '15px';
            navLinks.style.zIndex = '999';
        });
    </script>

</body>
</html>
